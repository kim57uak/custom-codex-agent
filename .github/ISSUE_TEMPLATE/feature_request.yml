name: Feature Request
about: Suggest an idea for this project
title: "[FEAT] "
labels: enhancement
assignees: ''

body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 현재 시스템에서 어떤 불편함이 있나요?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결책
      description: 어떤 기능이 추가되면 좋을지 명확하게 설명해 주세요.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 고려해본 대안
      description: 이 문제를 해결하기 위해 고려해본 다른 방법이 있나요?
